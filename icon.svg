<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0F0D1E"/>

  <!-- Gradient defs -->
  <defs>
    <linearGradient id="bodyG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B2060"/>
      <stop offset="100%" stop-color="#1E1040"/>
    </linearGradient>
    <linearGradient id="moneyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00B860"/>
    </linearGradient>
    <clipPath id="bodyC">
      <ellipse cx="235" cy="285" rx="148" ry="118"/>
    </clipPath>
  </defs>

  <!-- Tail -->
  <path d="M 92 255 Q 38 220 50 170 Q 64 120 95 165"
    stroke="#7C3AED" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="235" cy="285" rx="148" ry="118" fill="url(#bodyG)" stroke="#5B21B6" stroke-width="4"/>

  <!-- Money fill (~45%) -->
  <rect x="87" y="232" width="296" height="171" fill="url(#moneyG)" clip-path="url(#bodyC)" opacity="0.8"/>
  <!-- Glow line -->
  <rect x="87" y="232" width="296" height="6" fill="#00FF88" clip-path="url(#bodyC)" opacity="0.9"/>

  <!-- Body shine -->
  <ellipse cx="196" cy="225" rx="44" ry="24" fill="white" opacity="0.07" transform="rotate(-20 196 225)"/>

  <!-- Legs -->
  <rect x="118" y="383" width="36" height="52" rx="18" fill="#1E1040" stroke="#5B21B6" stroke-width="3"/>
  <rect x="172" y="390" width="36" height="46" rx="18" fill="#1E1040" stroke="#5B21B6" stroke-width="3"/>
  <rect x="228" y="390" width="36" height="46" rx="18" fill="#1E1040" stroke="#5B21B6" stroke-width="3"/>
  <rect x="282" y="383" width="36" height="52" rx="18" fill="#1E1040" stroke="#5B21B6" stroke-width="3"/>

  <!-- Head -->
  <ellipse cx="368" cy="248" rx="72" ry="68" fill="url(#bodyG)" stroke="#5B21B6" stroke-width="4"/>

  <!-- Ear -->
  <ellipse cx="352" cy="185" rx="30" ry="23" fill="#5B21B6" transform="rotate(-15 352 185)"/>
  <ellipse cx="352" cy="185" rx="18" ry="14" fill="#7C3AED" transform="rotate(-15 352 185)"/>

  <!-- Snout -->
  <ellipse cx="420" cy="270" rx="38" ry="30" fill="#2D1B55" stroke="#5B21B6" stroke-width="3"/>
  <circle cx="408" cy="268" r="9" fill="#0A0614" opacity="0.9"/>
  <circle cx="432" cy="268" r="9" fill="#0A0614" opacity="0.9"/>

  <!-- Eye -->
  <circle cx="367" cy="228" r="13" fill="#0A0614"/>
  <circle cx="369" cy="230" r="8"  fill="#00FF88" opacity="0.9"/>
  <circle cx="373" cy="225" r="3"  fill="white"   opacity="0.95"/>

  <!-- Coin slot -->
  <rect x="200" y="148" width="72" height="14" rx="7" fill="#00FF88" opacity="0.9"/>
</svg>
